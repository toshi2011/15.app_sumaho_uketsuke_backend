name: Create Issue from Markdown

on:
  push:
    paths:
      - 'note/issues/*.md'
  workflow_dispatch:

jobs:
  create-issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Get changed md files
        id: changed
        run: |
          # 日本語ファイル名を正しく扱う
          git config core.quotepath false
          
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            files=$(git diff --name-only HEAD~1 HEAD -- 'note/issues/*.md' || echo "")
          else
            files=$(find note/issues -name "*.md" 2>/dev/null || echo "")
          fi
          echo "Detected files: $files"
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$files" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Create Issues
        if: steps.changed.outputs.files != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const filesRaw = process.env.FILES || '';
            const files = filesRaw.trim().split('\n').filter(f => f && !f.startsWith('"'));
            
            console.log('Processing files:', files);
            
            if (files.length === 0) {
              console.log('No valid files to process');
              return;
            }
            
            for (const file of files) {
              if (!file) continue;
              
              try {
                const content = fs.readFileSync(file, 'utf8');
                const parts = file.split('/');
                const filename = parts[parts.length - 1].replace('.md', '');
                const title = filename;
                
                console.log('Creating issue: ' + title);
                
                const issue = await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: title,
                  body: content
                });
                
                console.log('Created issue: ' + issue.data.html_url);
              } catch (error) {
                console.error('Failed: ' + error.message);
              }
            }
        env:
          FILES: ${{ steps.changed.outputs.files }}
