name: Create Issue from Markdown

on:
  push:
    paths:
      - 'note/issues/*.md'

jobs:
  create-issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      
      - name: Get new md files
        id: changed
        run: |
          files=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'note/issues/*.md' 2>/dev/null || echo "")
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$files" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Create Issues
        if: steps.changed.outputs.files != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const filesRaw = process.env.FILES || '';
            const files = filesRaw.trim().split('\n').filter(f => f);
            
            for (const file of files) {
              if (!file) continue;
              
              try {
                const content = fs.readFileSync(file, 'utf8');
                const parts = file.split('/');
                const filename = parts[parts.length - 1].replace('.md', '');
                const title = filename;
                
                const issue = await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: title,
                  body: content
                });
                
                console.log('Created issue: ' + issue.data.html_url);
              } catch (error) {
                console.error('Failed to create issue from ' + file + ': ' + error.message);
              }
            }
        env:
          FILES: ${{ steps.changed.outputs.files }}
